<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#06101F" />
    <title>EFC Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #06101f;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(27, 182, 255, 0.18), transparent 34rem),
          #06101f;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      img {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 8vw, 42px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #c7d2e4;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: #1bb6ff;
        color: #06101f;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192x192.png" alt="EFC" />
      <h1>You are offline</h1>
      <p>EFC is installed and ready. Reconnect to load live markets, account details, and wallet updates.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
